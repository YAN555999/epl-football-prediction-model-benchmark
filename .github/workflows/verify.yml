name: Verify immutable benchmark

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frozen-bytes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.2"
      - name: Verify frozen hashes and release contract without network access
        run: |
          python scripts/generate-epl-football-prediction-model-benchmark.py --check
          python -m unittest discover -s tests -p 'test_*.py'

  byte-for-byte-rebuild:
    needs: frozen-bytes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.2"
          cache: pip
      - name: Install the exact v1 runtime
        run: python -m pip install --requirement requirements.txt
      - name: Rebuild from ten SHA-pinned publisher files and compare exact bytes
        run: python scripts/generate-epl-football-prediction-model-benchmark.py --rebuild
